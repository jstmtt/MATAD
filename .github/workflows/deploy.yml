name: Deploy MATAD Holdings Dashboard

on:
  push:
    branches:
      - main
      - master
  schedule:
    # Run twice daily (at 00:00 and 12:00 UTC) to fetch fresh closing prices & transactions
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Fetch Portfolio Data & Compile
        run: node scripts/build-data.js
        env:
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
          T212_API_SECRET: ${{ secrets.T212_API_SECRET }}
          IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_QUERY_ID: ${{ secrets.IBKR_QUERY_ID }}

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/portfolio.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update portfolio database [skip ci]" && git pull --rebase origin main && git push)

      - name: Build Production Web Bundle
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite outputs build to the 'dist' directory
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
